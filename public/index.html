<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zuba</title>
<meta name="description" content="Zuba — the all-in-one app for professional home inspectors. Schedule, inspect, report, and get paid." />
<style>
  :root{--ink:#1c1c2e;--muted:#5b5b6b;--line:#e4e4ee;--brand:#5b5bd6;--soft:#f6f6fb;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:linear-gradient(180deg,#fff 0%,var(--soft) 100%);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  }
  .card{max-width:520px;text-align:center;}
  .logo{font-size:2.6rem;font-weight:800;letter-spacing:-.02em;color:var(--brand);margin:0 0 6px;}
  .tag{font-size:1.05rem;color:var(--muted);margin:0 0 28px;line-height:1.5;}
  .links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .links a{
    text-decoration:none;color:var(--brand);font-weight:600;font-size:.95rem;
    border:1px solid var(--line);border-radius:999px;padding:9px 18px;background:#fff;
    transition:border-color .15s;
  }
  .links a:hover{border-color:var(--brand);}
  .foot{margin-top:32px;color:var(--muted);font-size:.82rem;}
</style>
</head>
<body>
  <div class="card">
    <h1 class="logo">Zuba</h1>
    <p class="tag">The all-in-one app for professional home inspectors —<br />schedule, inspect, report, and get paid.</p>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/sms-optin-consent">SMS Reminders</a>
    </div>
    <p class="foot">A product of Embra LLC · [support@embrallc.com]</p>
  </div>
</body>
</html>
